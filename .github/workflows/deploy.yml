name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  # --- 第1段階: CI (Lint, Test, Build check) ---
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Next.jsのバージョンに合わせて
          cache: 'npm'       # npmのキャッシュを有効にして高速化
          cache-dependency-path: webapp/nextjs/package-lock.json

      - name: Install dependencies
        working-directory: webapp/nextjs
        run: npm ci          # package-lock.jsonに忠実にインストール

      - name: Run Lint
        working-directory: webapp/nextjs
        run: npm run lint    # ESLintのチェック

      # もしテストコードがあるなら追加
      # - name: Run Test
      #   run: npm test

      - name: Build Check
        working-directory: webapp/nextjs
        run: npm run build   # ここでビルドが通るか確認
        env:
          # ビルドに必要な環境変数があればここに追加
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

  # --- 第2段階: CD (Deploy to Lightsail) ---
  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build    # ← これが重要！上のジョブが成功した時だけ実行
    if: github.event_name == 'push'  # 手動実行(workflow_dispatch)時はデプロイしない
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/hackathon2026-spring-press-release-editor-main/webapp/nextjs
            git pull origin main
            NODE_OPTIONS="--max-old-space-size=1024" npm install
            rm -rf .next
            NODE_OPTIONS="--max-old-space-size=3072" npm run build
            sudo systemctl restart press-release-nextjs.service